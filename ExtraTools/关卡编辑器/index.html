<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关卡编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <h1>关卡编辑器</h1>
        <div class="top-tools">
            <button class="btn" id="btn-scene-tools" title="插入空白段等场景编辑工具">场景工具</button>
            <button class="btn" id="btn-clear-scene" title="清空地图内所有元素">清空场景</button>
            <span class="divider"></span>
            <button class="btn" id="btn-new" title="新建关卡">新建</button>
            <button class="btn" id="btn-open" title="打开 JSON">打开</button>
            <input type="file" id="file-input" accept=".json,application/json" hidden>
            <button class="btn primary" id="btn-save" title="保存 (Ctrl+S)">保存</button>
            <span id="save-status" class="save-status"></span>
            <span class="divider"></span>
            <button class="btn" id="btn-undo" title="撤销 (Ctrl+Z)">↶</button>
            <button class="btn" id="btn-redo" title="重做 (Ctrl+Y)">↷</button>
            <span class="divider"></span>
            <label class="inline-field">
                关卡
                <select id="level-select"></select>
            </label>
            <span class="divider"></span>
            <button class="btn tool-btn active" data-tool="select" title="选择 (V)">选择</button>
            <button class="btn tool-btn" data-tool="pan" title="平移 (H / 空格)">平移</button>
            <span class="divider"></span>
            <label class="inline-field snap-field">
                网格
                <select id="grid-size">
                    <option value="8" selected>8px</option>
                    <option value="16">16px</option>
                    <option value="32">32px</option>
                </select>
            </label>
            <button class="btn" id="btn-zoom-out">−</button>
            <span id="zoom-label" class="zoom-label">100%</span>
            <button class="btn" id="btn-zoom-in">+</button>
            <button class="btn" id="btn-zoom-fit">适应</button>
        </div>
    </header>

    <div class="workspace">
        <aside class="panel palette-panel">
            <h2>素材库</h2>
            <div id="palette-root"></div>
            <p class="palette-hint">拖拽素材到地图空白处放置；再次点击已选素材可取消。点击已有元素可选中/移动。</p>
        </aside>

        <main class="viewport-wrap">
            <div class="viewport-toolbar">
                <span id="cursor-pos">X: 0  Y: 0</span>
                <span id="level-info"></span>
            </div>
            <div class="viewport-scroll" id="viewport-scroll">
                <canvas id="level-canvas"></canvas>
            </div>
        </main>

        <aside class="panel inspector-panel">
            <div class="tab-bar">
                <button class="tab active" data-tab="props">属性</button>
                <button class="tab" data-tab="hierarchy">层级</button>
                <button class="tab" data-tab="level">关卡</button>
            </div>
            <div class="tab-content active" id="tab-props">
                <div id="props-empty" class="empty-hint">选中地图上的元素以编辑属性</div>
                <form id="props-form" hidden></form>
            </div>
            <div class="tab-content" id="tab-hierarchy">
                <ul id="hierarchy-list" class="hierarchy-list"></ul>
            </div>
            <div class="tab-content" id="tab-level">
                <form id="level-form" class="level-form"></form>
            </div>
        </aside>
    </div>

    <div id="player-settings-modal" class="modal-overlay" hidden>
        <div class="modal-panel player-settings-panel" role="dialog" aria-labelledby="player-settings-title">
            <div class="modal-header">
                <h2 id="player-settings-title">角色数值</h2>
                <button type="button" class="btn modal-close" id="btn-player-settings-close" title="关闭">×</button>
            </div>
            <div class="modal-body player-settings-body">
                <p class="field-hint">留空则使用默认值；跳跃速度填向上速度（正数）；重力越大落得越快。</p>
                <form id="player-settings-form" class="player-settings-form"></form>
            </div>
        </div>
    </div>

    <div id="scene-tools-modal" class="modal-overlay" hidden>
        <div class="modal-panel scene-tools-panel" role="dialog" aria-labelledby="scene-tools-title">
            <div class="modal-header">
                <h2 id="scene-tools-title">场景工具</h2>
                <button type="button" class="btn modal-close" id="btn-scene-tools-close" title="关闭">×</button>
            </div>
            <div class="modal-body scene-tools-body">
                <p class="field-hint scene-tools-dim">当前关卡：<span id="scene-tools-level-width">—</span> 宽 × <span id="scene-tools-level-height">—</span> 高</p>

                <div class="scene-tools-section-title">横向插入空白</div>
                <p class="field-hint">在指定 X 处插入空白：关卡变宽，该位置及右侧所有元素整体右移。</p>
                <div class="field-row">
                    <label for="insert-at-x">插入位置 X (px)</label>
                    <input id="insert-at-x" type="number" step="8" value="800">
                </div>
                <div class="insert-pick-row">
                    <button type="button" class="btn btn-sm" id="btn-insert-cursor-x" title="将画布上鼠标位置的 X 填入">使用光标 X</button>
                    <button type="button" class="btn btn-sm" id="btn-insert-sel-x" title="将当前选中元素的 X 填入">使用选中元素 X</button>
                </div>
                <div class="field-row">
                    <label for="insert-length-h">插入长度 (px)</label>
                    <input id="insert-length-h" type="number" step="8" value="100">
                </div>
                <button type="button" class="btn primary insert-blank-btn" id="btn-insert-blank">横向插入空白段</button>

                <div class="scene-tools-section-title">竖向插入空白</div>
                <p class="field-hint">在指定 Y 处插入空白：关卡变高，该位置及下方（Y 更大）所有元素整体下移。</p>
                <div class="field-row">
                    <label for="insert-at-y">插入位置 Y (px)</label>
                    <input id="insert-at-y" type="number" step="8" value="360">
                </div>
                <div class="insert-pick-row">
                    <button type="button" class="btn btn-sm" id="btn-insert-cursor-y" title="将画布上鼠标位置的 Y 填入">使用光标 Y</button>
                    <button type="button" class="btn btn-sm" id="btn-insert-sel-y" title="将当前选中元素的 Y 填入">使用选中元素 Y</button>
                </div>
                <div class="field-row">
                    <label for="insert-length-v">插入长度 (px)</label>
                    <input id="insert-length-v" type="number" step="8" value="100">
                </div>
                <button type="button" class="btn primary insert-blank-btn" id="btn-insert-blank-v">竖向插入空白段</button>
            </div>
        </div>
    </div>

    <script src="../../js/enemies/BossConfigs.js"></script>
    <script src="levelSchema.js"></script>
    <script src="playerMode.js"></script>
    <script src="main.js"></script>
</body>
</html>
